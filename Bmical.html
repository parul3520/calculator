<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

section {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    width: 350px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

label {
    font-weight: bold;
    color: #555;
}

input[type="number"] {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input[type="number"]:focus {
    border-color: #4facfe;
    outline: none;
}

input[type="radio"] {
    margin-left: 10px;
    margin-right: 5px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background-color: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #00c6fb;
}

#intro {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    color: #333;
}

    </style>
</head>
<body>
    <section>
        <div>
            <h1>BMI Calculator</h1>
            <label for="">Age</label>
            <input type="number" id="age"><br><br>
            <label for="">Gender</label>
            <input type="radio" value="male" id="male">male
            <input type="radio" value="female" id="female">female <br><br>
            <label for="">Height</label>
            <input type="number"  id="height" placeholder="cm"><br><br>
            <label for="">Weight</label>
            <input type="number"  id="Weight" placeholder="kg"><br><br><br>



            <button type="button" onclick="calc()">calculate</button>


            <h1 id="intro"></h1>
        </div>



    </section>

        <script src="Bmi.js"></script>

</body>
</html>
