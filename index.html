<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .calc{
            width: 300px;
            height: 300px;
            background-color: rgb(38, 126, 158);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 1px 1px 20px black;
            position: absolute;
            transform: translate(-50%,-50%);
            top: 50%;
            left: 50%;
        }
        .calc button{
            width: 52px;
            height: 40px;
            margin: 10px;
            font-size: 20px;
        }
        .calc input{
            width: 98%;
            height: 50px;
            margin-bottom: 10px;
            
        }
    </style>
</head>
<body>
    <div class="calc">
        <input type="text" id="in" disabled>
        <br>
        <button type="button" onclick="btn('1')">1</button>
        <button type="button" onclick="btn('2')">2</button>
        <button type="button" onclick="btn('3')">3</button>
        <button type="button" onclick="cal('+')">+</button>
        <br>
        <button type="button" onclick="btn('4')">4</button>
        <button type="button" onclick="btn('5')">5</button>
        <button type="button" onclick="btn('6')">6</button>
        <button type="button" onclick="cal('-')">-</button>
        <br>
        <button type="button" onclick="btn('7')">7</button>
        <button type="button" onclick="btn('8')">8</button>
        <button type="button" onclick="btn('9')">9</button>
        <button type="button" onclick="cal('/')">/</button>
        <br>
        <button type="button" onclick="btn('0')">0</button>
        <button type="button" onclick="clr()">cs</button>
        <button type="button" onclick="equal()">=</button>
        <button type="button" onclick="cal('*')">x</button>

    </div>


    <script src="calc.js"></script>
</body>
</html>
